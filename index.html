    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #08080c;
      --surface: #111118;
      --surface-hover: #1a1a24;
      --border: #1e1e2e;
      --text: #e0e0e8;
      --text-dim: #6b6b80;
      --accent: #ff3366;
      --accent-glow: rgba(255, 51, 102, 0.15);
      --green: #00ff88;
      --yellow: #ffd60a;
      --blue: #3b82f6;
      --purple: #a855f7;
      --orange: #f97316;
      --cyan: #06b6d4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none;
      z-index: 999;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,51,102,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,51,102,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .hero {
      text-align: center;
      padding: 4rem 0 3rem;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Language switcher */
    .lang-switcher {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 100;
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
    }

    .lang-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 0.4rem 0.7rem;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .lang-btn:not(:last-child) {
      border-right: 1px solid var(--border);
    }

    .lang-btn:hover { color: var(--text); background: var(--surface-hover); }
    .lang-btn.active { color: var(--accent); background: var(--accent-glow); }

    .badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(255,51,102,0.3);
      padding: 0.35rem 1rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
      background: rgba(255,51,102,0.05);
    }

    h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--yellow) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--text-dim);
      max-width: 600px;
      margin: 1rem auto 0;
      line-height: 1.6;
    }

    .subtitle strong { color: var(--accent); font-weight: 600; }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 2.5rem 0;
      flex-wrap: wrap;
    }

    .stat { text-align: center; }

    .stat-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--green);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: all 0.25s ease;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--card-accent, var(--accent)), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .card:hover {
      background: var(--surface-hover);
      border-color: rgba(255,51,102,0.2);
      transform: translateY(-2px);
    }

    .card:hover::before { opacity: 1; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .card-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      background: rgba(255,255,255,0.04);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      white-space: nowrap;
    }

    .card-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      white-space: nowrap;
    }

    .tag-ai { background: rgba(168,85,247,0.15); color: var(--purple); }
    .tag-dev { background: rgba(59,130,246,0.15); color: var(--blue); }
    .tag-marketing { background: rgba(249,115,22,0.15); color: var(--orange); }
    .tag-fun { background: rgba(0,255,136,0.15); color: var(--green); }
    .tag-tool { background: rgba(6,182,212,0.15); color: var(--cyan); }
    .tag-vision { background: rgba(255,214,10,0.15); color: var(--yellow); }

    .card-title { font-size: 1.05rem; font-weight: 600; line-height: 1.3; }
    .card-desc { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; flex: 1; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    .card-repo { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-dim); }
    .card-arrow { color: var(--accent); font-size: 0.9rem; transition: transform 0.2s; }
    .card:hover .card-arrow { transform: translateX(3px); }

    footer {
      text-align: center;
      padding: 4rem 0 2rem;
      color: var(--text-dim);
      font-size: 0.8rem;
      line-height: 1.8;
    }

    footer a { color: var(--accent); text-decoration: none; }

    .manifesto {
      max-width: 500px;
      margin: 0 auto 1.5rem;
      padding: 1.5rem;
      border: 1px dashed var(--border);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      line-height: 1.8;
      text-align: left;
    }

    .manifesto .comment { color: var(--green); }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .stats { gap: 1.5rem; }
      .container { padding: 1rem 1rem 3rem; }
      .lang-switcher { top: 0.75rem; right: 0.75rem; }
    }
  </style>
</head>

      { n:76, en: { name:"CodeMap", title:"AI Codebase Summarizer", desc:"Paste multiple files → architecture overview, key patterns, dependency map, onboarding guide" }, es: { name:"MapaCódigo", title:"Resumidor de código con IA", desc:"Pegá múltiples archivos → overview de arquitectura, patrones clave, mapa de dependencias, guía onboarding" }, pt: { name:"MapaCódigo", title:"Resumidor de código com IA", desc:"Cole múltiplos arquivos → visão de arquitetura, padrões chave, mapa de dependências, guia onboarding" }, fr: { name:"CarteCode", title:"Résumeur de code par IA", desc:"Collez plusieurs fichiers → vue d'architecture, patterns clés, carte des dépendances, guide d'intégration" }, url:"https://76codebasesummarizer.vercel.app", repo:"su-codemap", tag:"dev" },
    ];

    const tagColors = {
      ai: "var(--purple)", dev: "var(--blue)", marketing: "var(--orange)",
      fun: "var(--green)", tool: "var(--cyan)", vision: "var(--yellow)",
    };

    // ── State ─────────────────────────────────────────────────
    let currentLang = localStorage.getItem("slop-lang") || (navigator.language.startsWith("es") ? "es" : navigator.language.startsWith("pt") ? "pt" : navigator.language.startsWith("fr") ? "fr" : "en");
    let currentFilter = "all";

    function t() { return i18n[currentLang] || i18n.en; }

    function applyLang() {
      const s = t();
      document.documentElement.lang = currentLang;
      document.getElementById("badge").textContent = s.badge;
      document.getElementById("title").innerHTML = s.title;
      document.getElementById("subtitle").innerHTML = s.subtitle;
      document.getElementById("statApps").textContent = s.statApps;
      document.getElementById("statBudget").textContent = s.statBudget;
      document.getElementById("statSlop").textContent = s.statSlop;

      // Filters
      const bar = document.getElementById("filterBar");
      bar.innerHTML = Object.entries(s.filters).map(([key, label]) =>
        `<button class="filter-btn${key === currentFilter ? ' active' : ''}" data-filter="${key}">${label}</button>`
      ).join("");
      bar.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          currentFilter = btn.dataset.filter;
          bar.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          renderGrid();
        });
      });

      // Manifesto
      document.getElementById("manifesto").innerHTML = s.manifesto.map(l =>
        `<span class="comment">${l}</span>`
      ).join("<br>");

      document.getElementById("footerText").innerHTML = s.footer;

      // Lang buttons
      document.querySelectorAll(".lang-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.lang === currentLang);
      });

      renderGrid();
    }

    function renderGrid() {
      const s = t();
      const grid = document.getElementById("grid");
      const filtered = currentFilter === "all" ? ideas : ideas.filter(i => i.tag === currentFilter);

      grid.innerHTML = filtered.map(idea => {
        const loc = idea[currentLang] || idea.en;
        return `
        <a href="${idea.url}" target="_blank" rel="noopener" class="card" style="--card-accent: ${tagColors[idea.tag]}" data-tag="${idea.tag}">
          <div class="card-header">
            <span class="card-number">#${String(idea.n).padStart(2, '0')}</span>
            <span class="card-tag tag-${idea.tag}">${s.tags[idea.tag]}</span>
          </div>
          <div class="card-title">${loc.name}™</div>
          <div class="card-desc">${loc.desc}</div>
          <div class="card-footer">
            <span class="card-repo">${idea.repo}</span>
            <span class="card-arrow">→</span>
          </div>
        </a>`;
      }).join("");
    }

    // Lang switcher
    document.getElementById("langSwitcher").addEventListener("click", e => {
      const btn = e.target.closest(".lang-btn");
      if (!btn) return;
      currentLang = btn.dataset.lang;
      localStorage.setItem("slop-lang", currentLang);
      applyLang();
    });

    // Boot
    applyLang();
  </script>
</body>
